services:
  backend:
    image: ghcr.io/earlydreamer/book-api-work-backend:main
    container_name: today-us-backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    networks:
      - today-us-network

  nginx:
    image: nginx:stable-alpine
    container_name: today-us-nginx
    restart: always
    ports:
      - "18765:80" # 외부 18765 포트를 내부 80포트로 매핑
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - today-us-network

networks:
  today-us-network:
    driver: bridge
