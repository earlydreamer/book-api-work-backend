spring:
  application:
    name: today-us-backend
  config:
    import: optional:file:.env[.properties],optional:file:.env.local[.properties]
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

today-us:
  security:
    auth-enabled: true
    allowed-origins: ${TODAY_US_SECURITY_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${TODAY_US_SECURITY_ALLOWED_ORIGIN_PATTERNS:}
  time:
    zone-id: Asia/Seoul
  r2:
    account-id: ${TODAY_US_R2_ACCOUNT_ID:}
    access-key-id: ${TODAY_US_R2_ACCESS_KEY_ID:}
    secret-access-key: ${TODAY_US_R2_SECRET_ACCESS_KEY:}
    bucket: ${TODAY_US_R2_BUCKET:}
    public-base-url: ${TODAY_US_R2_PUBLIC_BASE_URL:}
    upload-prefix: ${TODAY_US_R2_UPLOAD_PREFIX:uploads}
    presign-ttl-seconds: ${TODAY_US_R2_PRESIGN_TTL_SECONDS:900}
  sweetbook:
    base-url: ${TODAY_US_SWEETBOOK_BASE_URL:https://api-sandbox.sweetbook.com}
    api-key: ${TODAY_US_SWEETBOOK_API_KEY:}
    book-spec-id: ${TODAY_US_SWEETBOOK_BOOK_SPEC_ID:}
    template-id: ${TODAY_US_SWEETBOOK_TEMPLATE_ID:}
    webhook-secret: ${TODAY_US_SWEETBOOK_WEBHOOK_SECRET:}
