name: Today Us Backend Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH for Cloudflare Tunnel
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          
          # 1. SSH Private Key 설정
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # 2. SSH Config 설정
          cat <<EOF > ~/.ssh/config
          Host synology-nas
            HostName ${{ secrets.SSH_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }}
            StrictHostKeyChecking no
            User ${{ secrets.SSH_USERNAME }}
            Port ${{ secrets.SSH_PORT }}
            IdentityFile ~/.ssh/id_ed25519
          EOF
          chmod 600 ~/.ssh/config

      - name: Create deploy directory
        run: |
          ssh -F ~/.ssh/config synology-nas "mkdir -p ${{ secrets.SSH_DEPLOY_PATH }}"

      - name: Create .env file for production from individual secrets
        run: |
          # 1. DB 설정
          echo "TODAY_US_DB_URL=${{ secrets.TODAY_US_DB_URL }}" >> .env
          echo "TODAY_US_DB_USERNAME=${{ secrets.TODAY_US_DB_USERNAME }}" >> .env
          echo "TODAY_US_DB_PASSWORD=${{ secrets.TODAY_US_DB_PASSWORD }}" >> .env
          
          # 2. 보안 및 공통 설정
          echo "TODAY_US_SECURITY_ALLOWED_ORIGINS=${{ secrets.TODAY_US_SECURITY_ALLOWED_ORIGINS }}" >> .env
          
          # 3. R2 저장소 설정
          echo "TODAY_US_R2_ACCOUNT_ID=${{ secrets.TODAY_US_R2_ACCOUNT_ID }}" >> .env
          echo "TODAY_US_R2_ACCESS_KEY_ID=${{ secrets.TODAY_US_R2_ACCESS_KEY_ID }}" >> .env
          echo "TODAY_US_R2_SECRET_ACCESS_KEY=${{ secrets.TODAY_US_R2_SECRET_ACCESS_KEY }}" >> .env
          echo "TODAY_US_R2_BUCKET=${{ secrets.TODAY_US_R2_BUCKET }}" >> .env
          echo "TODAY_US_R2_PUBLIC_BASE_URL=${{ secrets.TODAY_US_R2_PUBLIC_BASE_URL }}" >> .env
          
          # 4. 스윗북 API 설정
          echo "TODAY_US_SWEETBOOK_BASE_URL=${{ secrets.TODAY_US_SWEETBOOK_BASE_URL }}" >> .env
          echo "TODAY_US_SWEETBOOK_API_KEY=${{ secrets.TODAY_US_SWEETBOOK_API_KEY }}" >> .env
          echo "TODAY_US_SWEETBOOK_BOOK_SPEC_ID=${{ secrets.TODAY_US_SWEETBOOK_BOOK_SPEC_ID }}" >> .env
          echo "TODAY_US_SWEETBOOK_TEMPLATE_ID=${{ secrets.TODAY_US_SWEETBOOK_TEMPLATE_ID }}" >> .env
          echo "TODAY_US_SWEETBOOK_WEBHOOK_SECRET=${{ secrets.TODAY_US_SWEETBOOK_WEBHOOK_SECRET }}" >> .env

      - name: Copy config files via native SCP
        run: |
          # .env 파일을 포함하여 전송
          scp -F ~/.ssh/config docker-compose.yml .env nginx/nginx.conf "synology-nas:${{ secrets.SCP_TARGET_PATH }}/"

      - name: Deploy to Server via native SSH
        run: |
          ssh -F ~/.ssh/config synology-nas << 'EOF'
            set -eu
            
            # 환경 설정
            DEPLOY_DIR="${{ secrets.SSH_DEPLOY_PATH }}"
            REGISTRY="ghcr.io"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
            SERVICE_NAME="backend"
            
            # docker-compose 버전 탐지 로직
            COMPOSE_IS_V2=0
            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_V1="$(command -v docker-compose)"
            else
              for p in /var/packages/Docker/target/usr/bin/docker-compose /usr/local/bin/docker-compose /usr/bin/docker-compose /bin/docker-compose; do
                [ -x "$p" ] && COMPOSE_V1="$p" && break
              done
            fi
            if [ -z "${COMPOSE_V1:-}" ]; then
              if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
                COMPOSE_IS_V2=1
              else
                echo "❌ docker-compose(v1)/docker compose(v2) 없음"
                exit 1
              fi
            fi
            compose() { if [ "$COMPOSE_IS_V2" -eq 1 ]; then docker compose "$@"; else "$COMPOSE_V1" "$@"; fi; }
            
            cd "$DEPLOY_DIR"
            
            echo "🔐 GHCR 로그인 시도"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            echo "🚀 최신 이미지 풀링: $IMAGE"
            docker pull "$IMAGE" || true
            
            echo "🛑 기존 컨테이너 중지 및 제거"
            compose stop "$SERVICE_NAME" || true
            compose rm -f "$SERVICE_NAME" || true
            
            echo "✨ 신규 컨테이너 기동"
            compose up -d --no-deps --force-recreate "$SERVICE_NAME"
            
            echo "🧹 오래된 이미지 정리"
            docker image prune -f || true
            
            echo "🎉 배포 완료!"
          EOF
