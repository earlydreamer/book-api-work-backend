name: Today Us Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH for Cloudflare Tunnel
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          
          # 1. SSH Private Key 설정 (환경변수 사용하여 인덴트 오염 방지)
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # 2. SSH Config 설정
          cat <<EOF > ~/.ssh/config
          Host synology-nas
            HostName ${{ secrets.SSH_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }}
            StrictHostKeyChecking no
            User ${{ secrets.SSH_USERNAME }}
            Port ${{ secrets.SSH_PORT }}
            IdentityFile ~/.ssh/id_ed25519
          EOF
          chmod 600 ~/.ssh/config

      - name: Test tunnel connection
        run: |
          echo "Connecting to: ${{ secrets.SSH_HOST }} ..."
          ssh -v -F ~/.ssh/config synology-nas "echo SSH OK"

      - name: Create deploy directory
        run: |
          ssh -F ~/.ssh/config synology-nas "mkdir -p ${{ secrets.SSH_DEPLOY_PATH }}"

      - name: Copy config files via native SCP
        run: |
          # SCP는 SFTP 경로를 따르므로 SCP_TARGET_PATH 사용
          scp -F ~/.ssh/config docker-compose.yml nginx/nginx.conf "synology-nas:${{ secrets.SCP_TARGET_PATH }}/"

      - name: Deploy to Server via native SSH
        run: |
          ssh -F ~/.ssh/config synology-nas << 'EOF'
            set -eu
            
            # 환경 설정
            DEPLOY_DIR="${{ secrets.SSH_DEPLOY_PATH }}"
            REGISTRY="ghcr.io"
            IMAGE="${{ secrets.GHCR_IMAGE_PATH }}" # ghcr.io/owner/repo:tag
            SERVICE_NAME="today-us-backend"
            
            # docker-compose 버전 탐지 로직 (유저 제공 스크립트 이식)
            COMPOSE_IS_V2=0
            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_V1="$(command -v docker-compose)"
            else
              for p in /var/packages/Docker/target/usr/bin/docker-compose /usr/local/bin/docker-compose /usr/bin/docker-compose /bin/docker-compose; do
                [ -x "$p" ] && COMPOSE_V1="$p" && break
              done
            fi
            if [ -z "${COMPOSE_V1:-}" ]; then
              if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
                COMPOSE_IS_V2=1
              else
                echo "❌ docker-compose(v1)/docker compose(v2) 없음"
                exit 1
              fi
            fi
            compose() { if [ "$COMPOSE_IS_V2" -eq 1 ]; then docker compose "$@"; else "$COMPOSE_V1" "$@"; fi; }
            
            echo "✅ 배포 경로 이동: $DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            
            echo "🚀 최신 이미지 풀링: $IMAGE"
            docker pull "$IMAGE" || true
            
            echo "🛑 기존 컨테이너 중지 및 제거"
            compose stop "$SERVICE_NAME" || true
            compose rm -f "$SERVICE_NAME" || true
            
            echo "✨ 신규 컨테이너 기동"
            compose up -d --no-deps --force-recreate "$SERVICE_NAME"
            
            echo "🧹 오래된 이미지 정리"
            docker image prune -f || true
            
            echo "🎉 배포 완료!"
          EOF
